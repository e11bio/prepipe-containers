name: Build BigStitcher-Spark container

on:
  push:
    branches: [main]
    paths:
      - 'bigstitcher-spark/**'
      - '.github/workflows/build-bigstitcher-spark.yml'
  workflow_dispatch:
    inputs:
      mpicbg_ref:
        description: 'mpicbg commit SHA / branch / tag (Dockerfile pin used when blank)'
        default: ''
      mvrecon_ref:
        description: 'multiview-reconstruction commit SHA / branch / tag (Dockerfile pin used when blank)'
        default: ''
      bigstitcher_spark_ref:
        description: 'BigStitcher-Spark commit SHA / branch / tag (Dockerfile pin used when blank)'
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: e11bio/bigstitcher-spark

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: bigstitcher-spark
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # When inputs are blank (push trigger or unspecified workflow_dispatch),
          # only pass build-args for refs the user actually overrode — letting the
          # Dockerfile's pinned ARG defaults take effect. The conditional shell
          # interpolation produces an empty line that build-push-action ignores.
          build-args: |
            ${{ inputs.mpicbg_ref && format('MPICBG_REF={0}', inputs.mpicbg_ref) || '' }}
            ${{ inputs.mvrecon_ref && format('MVRECON_REF={0}', inputs.mvrecon_ref) || '' }}
            ${{ inputs.bigstitcher_spark_ref && format('BIGSTITCHER_SPARK_REF={0}', inputs.bigstitcher_spark_ref) || '' }}
